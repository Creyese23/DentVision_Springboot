# ===============================================================================
# CONFIGURACIÓN DE DESARROLLO - BASE DE DATOS H2
# ===============================================================================
# Archivo de configuración para entorno de desarrollo usando H2 embebido
# Esto permite que la aplicación funcione sin necesidad de base de datos externa

# ------------------------------
# CONFIGURACIÓN DE BASE DE DATOS H2
# ------------------------------
spring.datasource.url=jdbc:h2:mem:dentvision
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ------------------------------
# CONFIGURACIÓN H2 CONSOLE
# ------------------------------
# Habilitar consola H2 para administración visual
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------------------------------
# CONFIGURACIÓN DE JPA / HIBERNATE
# ------------------------------
# Crear esquema automáticamente para desarrollo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Excluir repositories problemáticos específicos
spring.jpa.repositories.bootstrap-mode=deferred

# ------------------------------
# CONFIGURACIÓN DE DATOS INICIALES
# ------------------------------
# Deshabilitado - se creará automáticamente sin datos iniciales
# spring.sql.init.mode=always
# spring.sql.init.data-locations=classpath:data.sql
