# ===============================================================================
# CONFIGURACIÓN DE LA APLICACIÓN DENTVISION SPRING BOOT
# ===============================================================================
# Archivo de configuración principal para el sistema de gestión dental DentVision.
# Contiene todas las propiedades necesarias para el funcionamiento de la aplicación
# incluyendo base de datos, seguridad, servidor y serialización.
#
# Autor: SENA
# Versión: 1.0
# Desde: 2024
# ===============================================================================

# ------------------------------
# CONFIGURACIÓN GENERAL DE LA APP
# ------------------------------
# Nombre identificador de la aplicación Spring Boot
spring.application.name=DentVision_Spring

# ------------------------------
# CONFIGURACIÓN DEL SERVIDOR
# ------------------------------
# Puerto en el que se ejecutará la aplicación (8080 es el puerto por defecto de Spring Boot)
server.port=8080

# ------------------------------
# CONFIGURACIÓN DE BASE DE DATOS MYSQL
# ------------------------------
# URL de conexión a la base de datos MySQL
# Se utiliza variable de entorno ${URL} para mantener la configuración segura
spring.datasource.url=${URL}

# Usuario de la base de datos
# Se utiliza variable de entorno ${DB_HOST} para mantener la configuración segura
spring.datasource.username=${DB_HOST}

# Contraseña de la base de datos
# Se utiliza variable de entorno ${DB_PASSWORD} para mantener la configuración segura
spring.datasource.password=${DB_PASSWORD}

# Driver JDBC para MySQL 8.x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------
# CONFIGURACIÓN DE JPA / HIBERNATE
# ------------------------------
# Estrategia de DDL (Data Definition Language)
# - update: Actualiza el esquema automáticamente al iniciar la aplicación
# - validate: Solo valida el esquema sin hacer cambios
# - create: Crea el esquema desde cero cada vez
# - create-drop: Crea el esquema y lo elimina al finalizar
# - none: No realiza ninguna acción DDL
spring.jpa.hibernate.ddl-auto=update

# Muestra las sentencias SQL en la consola (útil para debugging)
spring.jpa.show-sql=true

# Formatea las sentencias SQL para mejor legibilidad en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico de MySQL para optimizar las consultas SQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ------------------------------
# CONFIGURACIÓN DE JACKSON (JSON)
# ------------------------------
# Habilita la indentación en la salida JSON para mejor legibilidad
# Útil para desarrollo y debugging de respuestas API
spring.jackson.serialization.indent-output=true

# ------------------------------
# CONFIGURACIÓN DE SEGURIDAD JWT
# ------------------------------
# Secreto para firmar los tokens JWT
# IMPORTANTE: En producción, este valor debe ser una cadena larga y segura
# Se recomienda usar variables de entorno para mayor seguridad
security.jwt.secret=dentvision-secret-key-change-me

# Emisor (issuer) de los tokens JWT
# Identifica quién emitió el token, útil para validación
security.jwt.issuer=dentvision

